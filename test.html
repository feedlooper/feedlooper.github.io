<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeedLoop | Circular Bioconversion</title>
  <meta name="description" content="FeedLoop converts organic by-products into insect protein, insect oil, and frass fertilizer for local feed and agriculture markets." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #6BAA27;
      --green-dark: #3e6e18;
      --black: #050604;
      --charcoal: #43444b;
      --white: #ffffff;
      --cream: #f6f2e8;
      --stone: #e2ddd0;
      --muted: #66686d;
      --line: rgba(5, 6, 4, 0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: Manrope, system-ui, sans-serif;
      background: var(--cream);
      color: var(--black);
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1320px, calc(100% - 48px)); margin: 0 auto; }

    /* Header over hero */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 50;
      color: var(--white);
      background: linear-gradient(to bottom, rgba(0,0,0,0.72), rgba(0,0,0,0));
      transition: background 0.25s ease, color 0.25s ease, border 0.25s ease;
    }

    header.scrolled {
      background: rgba(246, 242, 232, 0.92);
      color: var(--black);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid currentColor;
      position: relative;
    }
    .logo-mark::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      right: -4px;
      top: 4px;
      background: var(--green);
      border-radius: 50%;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      align-items: center;
      font-size: 0.92rem;
      font-weight: 800;
    }
    nav a { opacity: 0.92; }
    nav a:hover { opacity: 1; color: var(--green); }
    .nav-cta {
      padding: 12px 18px;
      background: var(--green);
      color: var(--white);
      border-radius: 999px;
      opacity: 1;
    }

    /* Media placeholders */
    .media-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .media-placeholder {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(107,170,39,0.22), rgba(5,6,4,0.12)),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 18px),
        #d8d2c5;
    }

    .media-placeholder.dark {
      background:
        linear-gradient(135deg, rgba(107,170,39,0.16), rgba(0,0,0,0.62)),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 18px),
        #10120e;
    }

    .placeholder-note {
      position: relative;
      z-index: 2;
      display: inline-flex;
      flex-direction: column;
      gap: 7px;
      max-width: 360px;
      padding: 18px;
      border: 1px dashed rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.28);
      color: var(--white);
      border-radius: 16px;
      backdrop-filter: blur(6px);
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .placeholder-note strong { font-size: 0.95rem; }
    .placeholder-note span { opacity: 0.78; font-weight: 600; }

    /* Hero */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: end;
      color: var(--white);
      padding: 150px 0 58px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0.18) 36%, rgba(0,0,0,0.76)),
        linear-gradient(to right, rgba(0,0,0,0.52), rgba(0,0,0,0.1));
    }

    .hero .placeholder-note {
      position: absolute;
      top: 50%;
      right: 6vw;
      transform: translateY(-50%);
      z-index: 4;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      width: 100%;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }
    .hero-label::before { content: ""; width: 42px; height: 4px; background: var(--green); }

    h1 {
      font-size: clamp(3.7rem, 7.7vw, 8.4rem);
      line-height: 0.94;
      letter-spacing: -0.078em;
      font-weight: 800;
      max-width: 980px;
    }

    .hero-bottom
